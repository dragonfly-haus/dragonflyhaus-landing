<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!--
    sideral — Icon Mark (standalone)
    Use for: favicon, GitHub avatar, CLI badge, app icon
    Minimum size: 16px
  -->
  <g fill="currentColor" transform="translate(32, 20)">
    <!-- Front wings — 100% -->
    <polygon points="0,-2 -18,-16 -14,3" opacity="1"/>
    <polygon points="0,-2 18,-16 14,3" opacity="1"/>
    <!-- Back wings — 25% -->
    <polygon points="0,4 -12,0 -9,11" opacity="0.25"/>
    <polygon points="0,4 12,0 9,11" opacity="0.25"/>
    <!-- Body -->
    <circle cx="0" cy="1" r="1.2"/>
    <!-- Tail -->
    <line x1="0" y1="4" x2="0" y2="24" stroke="currentColor" stroke-width="0.9" stroke-linecap="round"/>
    <circle cx="0" cy="27" r="1"/>
  </g>
</svg>
