<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" fill="none">
  <!--
    sideral — Primary Logo
    B1 Sharp Wings · Line + Dot Tail · High Contrast

    Usage:
    - fill="currentColor" inherits from parent CSS color
    - Works on any background — just set color on parent
    - Minimum size: 48px wide
  -->
  <g id="dragonfly-lockup" fill="currentColor">
    <!-- Mark -->
    <g id="dragonfly-mark" transform="translate(100, 32)">
      <!-- Front wings — 100% opacity -->
      <polygon points="0,-2 -24,-20 -18,3" opacity="1"/>
      <polygon points="0,-2 24,-20 18,3" opacity="1"/>
      <!-- Back wings — 25% opacity -->
      <polygon points="0,5 -16,0 -12,14" opacity="0.25"/>
      <polygon points="0,5 16,0 12,14" opacity="0.25"/>
      <!-- Body -->
      <circle cx="0" cy="2" r="1.5"/>
      <!-- Tail -->
      <line x1="0" y1="5" x2="0" y2="32" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
      <circle cx="0" cy="35" r="1.2"/>
    </g>
    <!-- Wordmark -->
    <text
      x="100" y="90"
      text-anchor="middle"
      font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
      font-size="10"
      font-weight="400"
      letter-spacing="2"
      fill="currentColor"
    >sideral</text>
  </g>
</svg>
